# Application name
spring.application.name=YEOGINAMGIM-BACKEND

# Import secret properties if exists
spring.config.import=optional:application-secret.properties

# Server port
server.port=8080
# Frontend origin used for OAuth callback redirects during local LAN testing.
app.frontend-base-url=http://localhost:5173
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.url=jdbc:mysql://localhost:3306/yeoginamgim_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.jdbc.bind=TRACE

# Data.sql settings
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:/sql/schema.sql
spring.sql.init.data-locations=classpath:/sql/data.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# Multipart upload limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true
server.tomcat.max-swallow-size=-1

# Redis email verification defaults. Override secrets in application-secret.properties.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3s

# Mail defaults for local development. Set real SMTP credentials in application-secret.properties.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Runtime place cache CSV
place.cache-file-path=../data/places-cache.csv

# Profanity filter FastAPI. Backend calls this server-side; do not expose it to the frontend.
profanity.filter.enabled=${PROFANITY_FILTER_ENABLED:true}
profanity.filter.base-url=${PROFANITY_FILTER_BASE_URL:}
profanity.filter.check-path=/api/profanity
profanity.filter.connect-timeout=${PROFANITY_FILTER_CONNECT_TIMEOUT:2s}
profanity.filter.read-timeout=${PROFANITY_FILTER_READ_TIMEOUT:5s}
profanity.filter.fail-open=${PROFANITY_FILTER_FAIL_OPEN:false}

# aws
spring.cloud.aws.region.static=ap-northeast-2
spring.cloud.aws.s3.bucket=elasticbeanstalk-ap-northeast-2-988477084982
